<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LP Builder V9.3</title>

<style>
body{margin:0;padding:20px;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0c2b24,#1f3a2f);color:white;text-align:center;}
h1{color:#ffd700;font-size:42px;margin:15px 0;}
.hook{color:#ffeb3b;font-size:46px;font-weight:bold;margin:10px 0;text-shadow:0 0 20px #ffd700;}
.photo{width:240px;height:240px;border-radius:50%;border:10px solid #ffd700;margin:25px auto;display:block;object-fit:cover;box-shadow:0 0 30px rgba(255,215,0,0.7);}
.card{background:rgba(8,61,53,0.95);padding:25px;border-radius:20px;margin:25px auto;max-width:620px;}
.btn{background:#ffd700;color:#000;padding:18px 50px;border-radius:50px;text-decoration:none;font-size:22px;font-weight:bold;display:inline-block;margin:20px 0;}
</style>
</head>

<body>

<div class="box">
    <h1 id="judul">ISTIKMAL SYARIAH</h1>
    
    <div class="hook" id="hook">Menabung Umroh Lebih Terarah</div>
    
    <img id="foto" class="photo" src="https://i.postimg.cc/0jKzY8ZJ/default-leader.jpg" alt="">
    
    <h2 id="tagline">Bisnis Berkah Mengantarkan Sampai Ke Mekah</h2>
    
    <div class="card">
        <p id="deskripsi">Mulai rencanakan Umroh dengan cara sederhana. Sisihkan bukan sisakan.</p>
        
        <h3 id="leader">Dibimbing oleh:<br><strong>Sugiarto Kurniawan</strong><br>Silver Entrepreneur</h3>
        
        <a id="waBtn" href="#" class="btn">Konsultasi Sekarang</a>
    </div>
</div>

<script>
// Script untuk download
function buildAndDownload() {
    const nama = document.getElementById("nama")?.value || "Sugiarto Kurniawan";
    const wa = document.getElementById("wa")?.value || "6282240001731";
    const jabatan = document.getElementById("jabatan")?.value || "Silver Entrepreneur";
    const foto = document.getElementById("foto")?.value || "";
    const hook = document.getElementById("hook")?.value || "Menabung Umroh Lebih Terarah";
    const judul = document.getElementById("judul")?.value || "ISTIKMAL SYARIAH";
    const tagline = document.getElementById("tagline")?.value || "Bisnis Berkah Mengantarkan Sampai Ke Mekah";
    const deskripsi = document.getElementById("deskripsi")?.value || "";

    const htmlContent = `<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>${judul}</title>
<style>
body{margin:0;padding:30px 20px;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0c2b24,#1f3a2f);color:white;text-align:center;}
h1{color:#ffd700;font-size:42px;margin:15px 0;}
.hook{color:#ffeb3b;font-size:46px;font-weight:bold;margin:10px 0;text-shadow:0 0 20px #ffd700;}
.photo{width:240px;height:240px;border-radius:50%;border:10px solid #ffd700;margin:25px auto;display:block;object-fit:cover;box-shadow:0 0 30px rgba(255,215,0,0.7);}
.card{background:rgba(8,61,53,0.95);padding:25px;border-radius:20px;margin:25px auto;max-width:620px;}
.btn{background:#ffd700;color:#000;padding:18px 50px;border-radius:50px;text-decoration:none;font-size:22px;font-weight:bold;display:inline-block;margin:20px 0;}
</style>
</head>
<body>
    <h1>${judul}</h1>
    <div class="hook">${hook}</div>
    <img src="${foto}" class="photo" alt="${nama}">
    <h2>${tagline}</h2>
    <div class="card">
        <p>${deskripsi.replace(/\n/g, '<br><br>')}</p>
        <h3>Dibimbing oleh:<br><strong>${nama}</strong><br>${jabatan}</h3>
        <a href="https://wa.me/${wa}" class="btn">Konsultasi Sekarang</a>
    </div>
</body>
</html>`;

    const blob = new Blob([htmlContent], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'LP-' + nama.replace(/ /g, '-') + '.html';
    a.click();

    alert("✅ File berhasil di-download!");
}
</script>

</body>
</html>
